# Build, test, and deploy Resonark (a static PWA) to GitHub Pages on every push
# to main. Enable it once under Settings → Pages → Build and deployment → Source:
# "GitHub Actions". Prefer a custom domain or a user/org Pages site so the app is
# served at the domain root (see DEPLOY.md — a project subpath complicates the
# Spotify redirect URI).
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test          # unit suite must pass before we ship
      - run: npm run build
        env:
          # Bakes in a shared Spotify Client ID so "Connect Spotify" is one tap
          # (no per-user dev setup). A Client ID is a public identifier, not a
          # secret — it ends up in the shipped JS either way. Add it under
          # Settings → Secrets and variables → Actions as a repository Variable
          # (preferred) or Secret named VITE_SPOTIFY_CLIENT_ID. If unset (e.g. a
          # fork), the app falls back to prompting the user for their own ID.
          VITE_SPOTIFY_CLIENT_ID: ${{ vars.VITE_SPOTIFY_CLIENT_ID || secrets.VITE_SPOTIFY_CLIENT_ID }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
