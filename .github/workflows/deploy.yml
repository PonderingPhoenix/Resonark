# Build, test, and deploy Resonark (a static PWA) to GitHub Pages on every push
# to main. Enable it once under Settings → Pages → Build and deployment → Source:
# "GitHub Actions". Prefer a custom domain or a user/org Pages site so the app is
# served at the domain root (see DEPLOY.md — a project subpath complicates the
# Spotify redirect URI).
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test          # unit suite must pass before we ship
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
